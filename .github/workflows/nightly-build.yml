name: Nightly Build
on:
  push:
    branches:
      - nightly

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      short_sha: ${{ steps.short-sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from info.json
        id: extract-version
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' info.json | cut -d'"' -f4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Get short SHA
        id: short-sha
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build-arch:
    needs: get-version
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm python python-pip python-pyqt6 python-pyqt6-webengine base-devel git dotnet-sdk

      - name: Install PyInstaller
        run: |
          pip install --break-system-packages --upgrade pip
          pip install --break-system-packages pyinstaller

      - name: Compile native helpers
        run: |
          g++ -std=c++17 -o simpleweblib startupinfo.cpp
          dotnet new console -n InfoLoader -o infoloader-build --force
          cp infoloader.cs infoloader-build/Program.cs
          dotnet publish infoloader-build -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o infoloader-dist
          cp infoloader-dist/InfoLoader infoloaderbin
          chmod +x infoloaderbin

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --add-data "extensions.json:." \
            --add-data "info.json:." \
            --add-binary "simpleweblib:." \
            --add-binary "infoloaderbin:." \
            SimpleWeb.py

      - name: Create archive
        run: |
          FOLDER="simpleweb-${{ needs.get-version.outputs.version }}-nightly.${{ needs.get-version.outputs.short_sha }}-arch"
          mkdir -p "$FOLDER"
          cp dist/SimpleWeb "$FOLDER"/
          cp simplewebex.py updater.py info.json extensions.json "$FOLDER"/
          chmod +x "$FOLDER"/SimpleWeb
          tar -czf "${FOLDER}-linux-x86_64.tar.gz" "$FOLDER"/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-linux-nightly-build
          path: simpleweb-${{ needs.get-version.outputs.version }}-nightly.${{ needs.get-version.outputs.short_sha }}-arch-linux-x86_64.tar.gz

  build-macos-arm64:
    needs: get-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        run: |
          pip install PyQt6 PyQtWebEngine pyinstaller

      - name: Compile native helpers
        run: |
          g++ -std=c++17 -o simpleweblib startupinfo.cpp
          dotnet new console -n InfoLoader -o infoloader-build --force
          cp infoloader.cs infoloader-build/Program.cs
          dotnet publish infoloader-build -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o infoloader-dist
          cp infoloader-dist/InfoLoader infoloaderbin
          chmod +x infoloaderbin

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --add-data "extensions.json:." \
            --add-data "info.json:." \
            --add-binary "simpleweblib:." \
            --add-binary "infoloaderbin:." \
            SimpleWeb.py

      - name: Create macOS app bundle and archive
        run: |
          FOLDER="simpleweb-${{ needs.get-version.outputs.version }}-nightly.${{ needs.get-version.outputs.short_sha }}-macos-arm64"
          mkdir -p "$FOLDER"
          if [ -d "dist/SimpleWeb.app" ]; then
            cp -R dist/SimpleWeb.app "$FOLDER"/
          else
            cp dist/SimpleWeb "$FOLDER"/
            chmod +x "$FOLDER"/SimpleWeb
          fi
          cp simplewebex.py updater.py info.json extensions.json "$FOLDER"/
          tar -czf "${FOLDER}.tar.gz" "$FOLDER"/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-nightly-build
          path: simpleweb-${{ needs.get-version.outputs.version }}-nightly.${{ needs.get-version.outputs.short_sha }}-macos-arm64.tar.gz

  build-windows:
    needs: get-version
    # GitHub doesn't expose a literal "Windows 11" hosted runner label; windows-latest
    # is currently the closest match (Windows Server 2022 desktop-experience base).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        run: |
          pip install PyQt6 PyQtWebEngine pyinstaller

      - name: Install MinGW (g++)
        run: |
          choco install mingw -y --x64
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Compile native helpers
        run: |
          g++ -std=c++17 -o simpleweblib.exe startupinfo.cpp
          dotnet new console -n InfoLoader -o infoloader-build --force
          Copy-Item infoloader.cs infoloader-build\Program.cs -Force
          dotnet publish infoloader-build -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o infoloader-dist
          Copy-Item infoloader-dist\InfoLoader.exe infoloaderbin.exe
        shell: pwsh

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --add-data "extensions.json;." `
            --add-data "info.json;." `
            --add-binary "simpleweblib.exe;." `
            --add-binary "infoloaderbin.exe;." `
            SimpleWeb.py
        shell: pwsh

      - name: Create archive
        run: |
          $folder = "simpleweb-${{ needs.get-version.outputs.version }}-nightly.${{ needs.get-version.outputs.short_sha }}-windows-x86_64"
          New-Item -ItemType Directory -Path $folder | Out-Null
          Copy-Item dist\SimpleWeb.exe $folder\
          Copy-Item simplewebex.py, updater.py, info.json, extensions.json $folder\
          Compress-Archive -Path $folder -DestinationPath "$folder.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-nightly-build
          path: simpleweb-${{ needs.get-version.outputs.version }}-nightly.${{ needs.get-version.outputs.short_sha }}-windows-x86_64.zip

  release:
    needs: [get-version, build-arch, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly-v${{ needs.get-version.outputs.version }}
          name: SimpleWeb Nightly v${{ needs.get-version.outputs.version }} (${{ needs.get-version.outputs.short_sha }})
          body: |
            Automated nightly build of SimpleWeb from commit ${{ needs.get-version.outputs.short_sha }}.

            This is an unstable development build — use at your own risk.

            **Builds included:**
            - Arch Linux x86_64
            - macOS Apple Silicon (ARM64)
            - Windows x86_64
          files: |
            arch-linux-nightly-build/simpleweb-${{ needs.get-version.outputs.version }}-nightly.${{ needs.get-version.outputs.short_sha }}-arch-linux-x86_64.tar.gz
            macos-arm64-nightly-build/simpleweb-${{ needs.get-version.outputs.version }}-nightly.${{ needs.get-version.outputs.short_sha }}-macos-arm64.tar.gz
            windows-x86_64-nightly-build/simpleweb-${{ needs.get-version.outputs.version }}-nightly.${{ needs.get-version.outputs.short_sha }}-windows-x86_64.zip
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
