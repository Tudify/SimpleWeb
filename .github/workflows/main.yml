name: Build and Release
on:
  push:
    branches:
      - main
jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from info.json
        id: extract-version
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' info.json | cut -d'"' -f4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build-arch:
    needs: get-version
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm python python-pip python-pyqt6 python-pyqt6-webengine base-devel git

      - name: Install PyInstaller
        run: |
          pip install --break-system-packages --upgrade pip
          pip install --break-system-packages pyinstaller

      - name: Compile native helper (startupinfo.cpp)
        run: |
          g++ -std=c++17 -o simpleweblib startupinfo.cpp

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --add-data "extensions.json:." \
            --add-data "info.json:." \
            --add-binary "simpleweblib:." \
            SimpleWeb.py

      - name: Create archive
        run: |
          mkdir -p simpleweb-${{ needs.get-version.outputs.version }}-arch
          cp dist/SimpleWeb simpleweb-${{ needs.get-version.outputs.version }}-arch/
          cp simplewebex.py updater.py info.json extensions.json simpleweb-${{ needs.get-version.outputs.version }}-arch/
          chmod +x simpleweb-${{ needs.get-version.outputs.version }}-arch/SimpleWeb
          tar -czf simpleweb-${{ needs.get-version.outputs.version }}-arch-linux-x86_64.tar.gz simpleweb-${{ needs.get-version.outputs.version }}-arch/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-linux-build
          path: simpleweb-${{ needs.get-version.outputs.version }}-arch-linux-x86_64.tar.gz

  build-macos-arm64:
    needs: get-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyQt6 PyQtWebEngine pyinstaller

      - name: Compile native helper (startupinfo.cpp)
        run: |
          g++ -std=c++17 -o simpleweblib startupinfo.cpp

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --add-data "extensions.json:." \
            --add-data "info.json:." \
            --add-binary "simpleweblib:." \
            SimpleWeb.py

      - name: Create macOS app bundle and archive
        run: |
          mkdir -p simpleweb-${{ needs.get-version.outputs.version }}-macos-arm64
          if [ -d "dist/SimpleWeb.app" ]; then
            cp -R dist/SimpleWeb.app simpleweb-${{ needs.get-version.outputs.version }}-macos-arm64/
          else
            cp dist/SimpleWeb simpleweb-${{ needs.get-version.outputs.version }}-macos-arm64/
            chmod +x simpleweb-${{ needs.get-version.outputs.version }}-macos-arm64/SimpleWeb
          fi
          cp simplewebex.py updater.py info.json extensions.json simpleweb-${{ needs.get-version.outputs.version }}-macos-arm64/
          tar -czf simpleweb-${{ needs.get-version.outputs.version }}-macos-arm64.tar.gz simpleweb-${{ needs.get-version.outputs.version }}-macos-arm64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: simpleweb-${{ needs.get-version.outputs.version }}-macos-arm64.tar.gz

  build-windows:
    needs: get-version
    # GitHub doesn't expose a literal "Windows 11" hosted runner label; windows-latest
    # is currently the closest match (Windows Server 2022 desktop-experience base).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          pip install PyQt6 PyQtWebEngine pyinstaller

      - name: Install MinGW (g++)
        run: |
          choco install mingw -y --x64
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Compile native helper (startupinfo.cpp)
        run: |
          g++ -std=c++17 -o simpleweblib.exe startupinfo.cpp
        shell: pwsh

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --add-data "extensions.json;." `
            --add-data "info.json;." `
            --add-binary "simpleweblib.exe;." `
            SimpleWeb.py
        shell: pwsh

      - name: Create archive
        run: |
          $folder = "simpleweb-${{ needs.get-version.outputs.version }}-windows-x86_64"
          New-Item -ItemType Directory -Path $folder | Out-Null
          Copy-Item dist\SimpleWeb.exe $folder\
          Copy-Item simplewebex.py, updater.py, info.json, extensions.json $folder\
          Compress-Archive -Path $folder -DestinationPath "simpleweb-${{ needs.get-version.outputs.version }}-windows-x86_64.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-build
          path: simpleweb-${{ needs.get-version.outputs.version }}-windows-x86_64.zip

  release:
    needs: [get-version, build-arch, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: SimpleWeb ${{ needs.get-version.outputs.version }}
          body: |
            Automated release of SimpleWeb ${{ needs.get-version.outputs.version }}

            **Builds included:**
            - Arch Linux x86_64
            - macOS Apple Silicon (ARM64)
            - Windows x86_64
          files: |
            arch-linux-build/simpleweb-${{ needs.get-version.outputs.version }}-arch-linux-x86_64.tar.gz
            macos-arm64-build/simpleweb-${{ needs.get-version.outputs.version }}-macos-arm64.tar.gz
            windows-x86_64-build/simpleweb-${{ needs.get-version.outputs.version }}-windows-x86_64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
